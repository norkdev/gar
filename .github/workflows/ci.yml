name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Cancel an in-flight run for the same branch / PR when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (resolves Python from .python-version)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --package gar-backend

      - name: Run pytest
        run: uv run --package gar-backend pytest backend/tests/ -q

  frontend:
    name: frontend (tsc + vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check + production build
        working-directory: frontend
        run: npm run build
