name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-flight run for the same branch / PR when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv (resolves Python from .python-version)
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --package gar-backend

      - name: Ruff lint
        run: uv run --package gar-backend ruff check backend/ infra/

      - name: Ruff format check
        run: uv run --package gar-backend ruff format --check backend/ infra/

      - name: Run pytest
        run: uv run --package gar-backend pytest backend/tests/ -q

  frontend:
    name: frontend (tsc + vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Prettier format check
        working-directory: frontend
        run: npm run format:check

      - name: Type-check + production build
        working-directory: frontend
        run: npm run build
